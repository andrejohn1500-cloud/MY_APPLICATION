name: Build Signed APK and AAB

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_FILE: my-release-key.jks
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      # Configure GRADLE_OPTS for memory management
      GRADLE_OPTS: "-Xmx2g -Dorg.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8"
      # Specify the build type (release)
      BUILD_TYPE: release

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4 # Updated to v4

      # 2️⃣ Make gradlew executable
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 3️⃣ Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4 # Updated to v4
        with:
          distribution: temurin
          java-version: 17

      # 4️⃣ Cache Gradle dependencies and wrapper
      - name: Cache Gradle
        uses: actions/cache@v4 # Updated to v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-cache-${{ runner.os }}-${{ hashFiles('**/build.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-cache-${{ runner.os }}-

      # 5️⃣ Decode and write the keystore file (FIXED)
      - name: Decode release keystore from base64
        # This command decodes the base64 secret into the specified filename
        run: echo $KEYSTORE_BASE64 | base64 --decode > app/my-release-key.jks

      # 6️⃣ Build Release APK and AAB
      - name: Build Release APK and AAB
        # Assumes standard Android project structure that reads signing config from local.properties
        run: ./gradlew assembleRelease bundleRelease --no-daemon -Dorg.gradle.jvmargs=-Xmx3g

      # 7️⃣ Upload artifacts (APK and AAB)
      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4 # Updated to v4
        with:
          name: app-release
          # Adjust these paths based on your actual module name (e.g., 'app' or 'game')
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab

            - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 3
          keep_minimum_runs: 3
            
