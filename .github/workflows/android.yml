name: Build Signed APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest

    env:
      KEYSTORE_FILE: my-release-key.jks
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      # JVM memory tweaks for Gradle
      GRADLE_OPTS: "-Xmx512m -Dorg.gradle.jvmargs=-Xmx512m -Dfile.encoding=UTF-8"

    steps:
      # 1️⃣ Checkout repository first
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Make gradlew executable
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 3️⃣ Debug: Gradle and AGP versions
      - name: Debug Gradle and AGP versions
        run: |
          echo "Gradle version:"
          ./gradlew --version

          echo "Android Gradle Plugin version:"
          if [ -f "build.gradle.kts" ]; then
            grep "com.android.tools.build:gradle" build.gradle.kts
          elif [ -f "build.gradle" ]; then
            grep "com.android.tools.build:gradle" build.gradle
          else
            echo "No Gradle build file found!"
          fi

      # 4️⃣ Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 5️⃣ Cache Gradle dependencies and wrapper
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-cache-${{ runner.os }}-${{ hashFiles('**/build.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-cache-${{ runner.os }}-

      # 6️⃣ Decode release keystore from base64
