name: Build Signed APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest

    env:
      KEYSTORE_FILE: my-release-key.jks
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      # JVM memory tweaks for Gradle
      GRADLE_OPTS: "-Xmx512m -Dorg.gradle.jvmargs=-Xmx512m -Dfile.encoding=UTF-8"

    steps:
      # 1️⃣ Checkout repository first
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Make gradlew executable
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 3️⃣ Debug: Gradle and AGP versions (robust)
      - name: Debug Gradle and AGP versions
        run: |
          echo "Gradle version:"
          ./gradlew --version

          echo "Android Gradle Plugin version:"
          if [ -f "build.gradle.kts" ]; then
            grep "com.android.tools.build:gradle" build.gradle.kts || echo "AGP line not found in build.gradle.kts"
          elif [ -f "build.gradle" ]; then
            grep "com.android.tools.build:gradle" build.gradle || echo "AGP line not found in build.gradle"
          else
            echo "No Gradle build file
