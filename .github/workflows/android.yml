name: Build and Sign APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build and Sign APK
    runs-on: windows-latest

    steps:
      # 1️⃣ Check out your repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Set up Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3️⃣ Decode and prepare keystore
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > my-release-key.jks

      # 4️⃣ Grant Gradle permission to execute
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: MY_APPLICATION

      # 5️⃣ Build and sign APK
      - name: Build APK
        working-directory: MY_APPLICATION
        run: |
          ./gradlew assembleRelease ^
            -Pandroid.injected.signing.store.file=../my-release-key.jks ^
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} ^
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} ^
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      # 6️⃣ Upload the signed APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: MY_APPLICATION/app/build/outputs/apk/release/app-release.apk
