name: Build and Sign APK

on:
  push:
    branches:
      - main  # or the branch you want to trigger builds
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Set up JDK 11
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      # 3️⃣ Decode the Base64 keystore and save as my-release-key.jks
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" > my-release-key.base64
          certutil -decode my-release-key.base64 my-release-key.jks

      # 4️⃣ Build the signed APK
      - name: Build APK
        run: |
          cd MyApplication
          ./gradlew clean assembleRelease \
            -Pandroid.injected.signing.store.file=../my-release-key.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      # 5️⃣ Upload signed APK as artifact
      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: MyApplication-signed-APK
          path: MyApplication/app/build/outputs/apk/release/*.apk
